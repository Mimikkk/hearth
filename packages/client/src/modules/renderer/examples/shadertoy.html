<script id="example1" type="x-shader/x-fragment">
  // https://www.shadertoy.com/view/Mt2SzR

  f32 random(f32 x) {

    return fract(sin(x) * 10000.);

  }

  f32 noise(vec2 p) {

    return random(p.x + p.y * 10000.);

  }

  vec2 sw(vec2 p) { return vec2(floor(p.x), floor(p.y)); }
  vec2 se(vec2 p) { return vec2(ceil(p.x), floor(p.y)); }
  vec2 nw(vec2 p) { return vec2(floor(p.x), ceil(p.y)); }
  vec2 ne(vec2 p) { return vec2(ceil(p.x), ceil(p.y)); }

  f32 smoothNoise(vec2 p) {

    vec2 interp = smoothstep(0., 1., fract(p));
    f32 s = mix(noise(sw(p)), noise(se(p)), interp.x);
    f32 n = mix(noise(nw(p)), noise(ne(p)), interp.x);
    return mix(s, n, interp.y);

  }

  f32 fractalNoise(vec2 p) {

    f32 x = 0.;
    x += smoothNoise(p);
    x += smoothNoise(p * 2.) / 2.;
    x += smoothNoise(p * 4.) / 4.;
    x += smoothNoise(p * 8.) / 8.;
    x += smoothNoise(p * 16.) / 16.;
    x /= 1. + 1./2. + 1./4. + 1./8. + 1./16.;
    return x;

  }

  f32 movingNoise(vec2 p) {

    f32 x = fractalNoise(p + iTime);
    f32 y = fractalNoise(p - iTime);
    return fractalNoise(p + vec2(x, y));

  }

  // call this for water noise function
  f32 nestedNoise(vec2 p) {

    f32 x = movingNoise(p);
    f32 y = movingNoise(p + 100.);
    return movingNoise(p + vec2(x, y));

  }

  void mainImage(out vec4 fragColor, in vec2 fragCoord)
  {
    vec2 uv = fragCoord.xy / iResolution.xy;
    f32 n = nestedNoise(uv * 6.);

    fragColor = vec4(mix(vec3(.4, .6, 1.), vec3(.1, .2, 1.), n), 1.);
  }

</script>
<script id="example2" type="x-shader/x-fragment">
  // https://www.shadertoy.com/view/3tcBzH

  f32 rand(vec2 co){
    return fract(sin(dot(co.xy, vec2(12.9898, 78.233))) * 43758.5453);
  }

  f32 hermite(f32 t)
  {
    return t * t * (3.0 - 2.0 * t);
  }

  f32 noise(vec2 co, f32 frequency)
  {
    vec2 v = vec2(co.x * frequency, co.y * frequency);

    f32 ix1 = floor(v.x);
    f32 iy1 = floor(v.y);
    f32 ix2 = floor(v.x + 1.0);
    f32 iy2 = floor(v.y + 1.0);

    f32 fx = hermite(fract(v.x));
    f32 fy = hermite(fract(v.y));

    f32 fade1 = mix(rand(vec2(ix1, iy1)), rand(vec2(ix2, iy1)), fx);
    f32 fade2 = mix(rand(vec2(ix1, iy2)), rand(vec2(ix2, iy2)), fx);

    return mix(fade1, fade2, fy);
  }

  f32 pnoise(vec2 co, f32 freq, i32 steps, f32 persistence)
  {
    f32 value = 0.0;
    f32 ampl = 1.0;
    f32 sum = 0.0;
    for (i32 i=0; i<steps; i++)
    {
      sum += ampl;
      value += noise(co, freq) * ampl;
      freq *= 2.0;
      ampl *= persistence;
    }
    return value / sum;
  }

  void mainImage(out vec4 fragColor, in vec2 fragCoord) {
    vec2 uv = fragCoord.xy / iResolution.xy;
    f32 gradient = 1.0 - uv.y;
    f32 gradientStep = 0.2;

    vec2 pos = fragCoord.xy / iResolution.x;
    pos.y -= iTime * 0.3125;

    vec4 brighterColor = vec4(1.0, 0.65, 0.1, 0.25);
    vec4 darkerColor = vec4(1.0, 0.0, 0.15, 0.0625);
    vec4 middleColor = mix(brighterColor, darkerColor, 0.5);

    f32 noiseTexel = pnoise(pos, 10.0, 5, 0.5);

    f32 firstStep = smoothstep(0.0, noiseTexel, gradient);
    f32 darkerColorStep = smoothstep(0.0, noiseTexel, gradient - gradientStep);
    f32 darkerColorPath = firstStep - darkerColorStep;
    vec4 color = mix(brighterColor, darkerColor, darkerColorPath);

    f32 middleColorStep = smoothstep(0.0, noiseTexel, gradient - 0.2 * 2.0);

    color = mix(color, middleColor, darkerColorStep - middleColorStep);
    color = mix(vec4(0.0), color, firstStep);
    fragColor = color;
  }
</script>
