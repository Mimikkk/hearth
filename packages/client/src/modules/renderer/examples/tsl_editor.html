<html lang="en">
<head>
  <title>webgpu - tsl editor</title>
  <meta charset="utf-8">
  <meta content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" name="viewport">
  <link href="./styles.css" rel="stylesheet" type="text/css">
</head>
<body>
<style>
    #source {
        height: 100%;
        left: 0;
        position: absolute;
        top: 0;
        width: 50%;
    }
    #result {
        height: 100%;
        position: absolute;
        right: 0;
        top: 0;
        width: 50%;
    }
    #renderer {
        bottom: 15px;
        height: 200px;
        pointer-events: none;
        position: absolute;
        right: calc(50% + 15px);
        width: 200px;
        z-index: 100;
    }
</style>
<div id="source"></div>
<div id="result"></div>
<div id="renderer"></div>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@latest/min/vs/loader.min.js"></script>
<script src="./tsl_editor.ts" type="module"></script>
</body>
</html>
